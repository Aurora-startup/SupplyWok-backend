# Development profile
# Use Dockerfile-compatible environment variable names with local defaults.
###    JDBC : SGDB :// HOST : PORT / DB
spring.datasource.url=jdbc:postgresql://${DATABASE_URL:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:supplywok}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:12345678}

# Developer-friendly JPA behavior
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true

# App port
server.port=${PORT:8092}
authorization.jwt.secret=${JWT_SECRET:local-dev-secret-key-change-me-12345678901234567890}
authorization.jwt.expiration.days=${JWT_EXPIRATION_DAYS:7}
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=none
